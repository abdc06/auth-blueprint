spring:
  profiles:
    active: dev
    group:
      dev:
        - common
---
spring:
  config:
    activate:
      on-profile: common
  application:
    name: auth-01-jwt-basic

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    hikari:
      driver-class-name: net.sf.log4jdbc.sql.jdbcapi.DriverSpy
      jdbc-url: jdbc:log4jdbc:postgresql://localhost:5432/auth-01-jwt-basic?charSet=UTF8
      username: tutorials
      password: tutorials