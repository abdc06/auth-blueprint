spring:
  profiles:
    active: dev
    group:
      dev:
        - common
---
spring:
  config:
    activate:
      on-profile: common
  application:
    name: auth-01-jwt-basic

jwt:
  header: Authorization
  secret: ${JWT_SECRET}
  refresh-token-secret: ${JWT_REFRESH_TOKEN_SECRET}
  access-token-validity-in-seconds: 3600
  refresh-token-validity-in-seconds: 43200

springdoc:
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    display-request-duration: true
  api-docs:
    path: /v3/api-docs
  show-actuator: true

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    hikari:
      driver-class-name: net.sf.log4jdbc.sql.jdbcapi.DriverSpy
      jdbc-url: jdbc:log4jdbc:postgresql://localhost:5432/auth-01-jwt-basic?charSet=UTF8
      username: tutorials
      password: tutorials